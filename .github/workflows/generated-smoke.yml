name: Generated App Smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generated-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install
        run: npm install

      - name: Cache generated app npm downloads
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-generated-app-${{ hashFiles('templates/next-saas/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-generated-app-

      - name: Smoke generated app
        run: npm run test:generated
